name: Build AVD GKI Kernel

on:
  workflow_dispatch:
    inputs:
      build_id_preset:
        description: 'Choose AVD Build ID Preset (or select custom to manually input below)'
        required: true
        type: choice
        options:
          - '9964412 (Android 14 6.1)'
          - '11987101 (Android 15 6.6)'
          - '10871489 (Android 13 5.15)'
          - 'custom (手動輸入於下方)'
        default: '9964412 (Android 14 6.1)'
      custom_build_id:
        description: 'Custom Build ID (Only used if "custom" is selected above)'
        required: false
        type: string
        default: ''
      ksu_version:
        description: 'KernelSU / KernelSU-Next Version Tag or Commit (e.g. v0.9.5, v3.0.0)'
        required: true
        type: string
        default: 'v0.9.5'
      ksu_variant:
        description: 'KernelSU Variant'
        required: true
        type: choice
        options:
          - 'KernelSU'
          - 'KernelSU-Next'
        default: 'KernelSU'
      arch:
        description: 'Target Architecture'
        required: true
        type: choice
        options:
          - 'x86_64'
          - 'arm64'
        default: 'x86_64'

jobs:
  build:
    name: "Build GKI ${{ inputs.arch }} - BuildID: ${{ github.event.inputs.build_id_preset }}"
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Free Disk Space
        uses: endersonmenezes/free-disk-space@v3
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          remove_tool_cache: true
          remove_swap: true

      - name: Setup Tools & Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y repo git curl
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Resolve Build ID
        run: |
          PRESET_ID="${{ inputs.build_id_preset }}"
          CUSTOM_ID="${{ inputs.custom_build_id }}"
          
          if [ "$PRESET_ID" = "custom (手動輸入於下方)" ]; then
            if [ -z "$CUSTOM_ID" ]; then
              echo "Error: You selected 'custom' but did not provide a custom_build_id!"
              exit 1
            fi
            BUILD_ID="$CUSTOM_ID"
          else
            BUILD_ID=$(echo "$PRESET_ID" | awk '{print $1}')
          fi
          
          echo "Resolved BUILD_ID: $BUILD_ID"
          echo "BUILD_ID=$BUILD_ID" >> $GITHUB_ENV

      - name: Sync Kernel Source
        run: |
          mkdir -p kernel
          cd kernel
          
          ARCH="${{ inputs.arch }}"
          if [ "$ARCH" = "x86_64" ]; then
            TARGET_ARCH="kernel_virt_x86_64"
          else
            TARGET_ARCH="kernel_aarch64"
          fi
          
          # Initialize Repo with the manifest for the exact Build ID
          repo init -u https://android.googlesource.com/kernel/manifest --depth=1
          curl -Lo .repo/manifests/manifest_${{ env.BUILD_ID }}.xml "https://ci.android.com/builds/submitted/${{ env.BUILD_ID }}/${TARGET_ARCH}/latest/raw/manifest_${{ env.BUILD_ID }}.xml"
          repo init -m manifest_${{ env.BUILD_ID }}.xml
          
          # Sync
          repo sync -c -j$(nproc --all)

      - name: Integrate KernelSU
        run: |
          cd kernel
          
          # Clone chosen variant
          if [ "${{ inputs.ksu_variant }}" = "KernelSU-Next" ]; then
            git clone https://github.com/rifsxd/KernelSU-Next.git KernelSU
          else
            git clone https://github.com/tiann/KernelSU.git KernelSU
          fi
          
          ./KernelSU/kernel/setup.sh ${{ inputs.ksu_version }}
          
          # Replace symlinks with physical copy for Bazel Sandbox
          rm -rf common/drivers/kernelsu
          cp -r KernelSU/kernel common/drivers/kernelsu
          # rm -f common/drivers/kernelsu/include/uapi
          # cp -r KernelSU/uapi common/drivers/kernelsu/include/uapi
          
          # Dynamic version calculation
          KSU_GIT_VERSION=$(git rev-list --count HEAD)
          BASE_OFFSET=10000
          if grep -q "30000" kernel/Makefile 2>/dev/null; then
            BASE_OFFSET=30000
          elif grep -q "10000" kernel/Makefile 2>/dev/null; then
            BASE_OFFSET=10000
          fi
          KSU_VERSION=$((BASE_OFFSET + KSU_GIT_VERSION))
          echo "Calculated KSU_VERSION: $KSU_VERSION"
          echo "KSU_VERSION=$KSU_VERSION" >> $GITHUB_ENV

          # Hardcode calculated KSU_VERSION to bypass fallback 16
          for f in common/drivers/kernelsu/Makefile common/drivers/kernelsu/Kbuild; do
            if [ -f "$f" ]; then
              sed -i "s/ccflags-y += -DKSU_VERSION=16/ccflags-y += -DKSU_VERSION=$KSU_VERSION/g" "$f"
              sed -i "s/KSU_VERSION := 16/KSU_VERSION := $KSU_VERSION/g" "$f"
            fi
          done

      # - name: Configure Defconfig
      #   run: |
      #     cd kernel
      #     ARCH="${{ inputs.arch }}"
      #     if [ "$ARCH" = "x86_64" ]; then
      #       DEFCONFIG="common/arch/x86/configs/gki_defconfig"
      #     else
      #       DEFCONFIG="common/arch/arm64/configs/gki_defconfig"
      #     fi
          
      #     # Enable options in defconfig
      #     echo "CONFIG_KPROBES=y" >> "$DEFCONFIG"
      #     echo "CONFIG_KSU=y" >> "$DEFCONFIG"
          
      #     # Revert or skip savedefconfig consistency checks
      #     for f in common/build.config.gki.*; do
      #       if [ -f "$f" ]; then
      #         echo 'POST_DEFCONFIG_CMDS=""' >> "$f"
      #       fi
      #     done
      #     if [ -f "common/build.config.gki" ]; then
      #       echo 'POST_DEFCONFIG_CMDS=""' >> "common/build.config.gki"
      #     fi

      - name: Build GKI Kernel
        run: |
          cd kernel
          ARCH="${{ inputs.arch }}"
          if [ "$ARCH" = "x86_64" ]; then
            tools/bazel run --config=fast --lto=none //common:kernel_x86_64_dist -- --dist_dir=dist/
          else
            tools/bazel run --config=fast --lto=none //common:kernel_aarch64_dist -- --dist_dir=dist/
          fi

      - name: Prepare Artifacts
        run: |
          mkdir -p output
          cd kernel/dist
          
          # Copy compiled kernel images
          if [ -f "bzImage" ]; then
            cp bzImage ../../output/
          fi
          if [ -f "Image" ]; then
            cp Image ../../output/
          fi
          if [ -f "Image.gz" ]; then
            cp Image.gz ../../output/
          fi
          
          # Generate metadata file
          cat > ../../output/build-info.txt << EOF
          Build ID: ${{ env.BUILD_ID }}
          Architecture: ${{ inputs.arch }}
          KSU Variant: ${{ inputs.ksu_variant }}
          KSU Version Code: ${{ env.KSU_VERSION }}
          KSU Git Version: ${{ inputs.ksu_version }}
          Build Date: $(date -u)
          EOF

      - name: Upload Kernel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel-${{ env.BUILD_ID }}-${{ inputs.arch }}
          path: output/*

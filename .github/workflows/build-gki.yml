name: Build AVD GKI Kernels

permissions:
  contents: read
  actions: read

on:
  workflow_dispatch:
    inputs:
      avd_target:
        description: 'AVD target to build'
        required: true
        type: choice
        options:
          - 'all'
          - 'a13-api33-5.15'
          - 'a14-api34-6.1'
          - 'a15-api35-6.6'
          - 'a16-api36.0-6.6'
          - 'a16-api36.1-6.12'
        default: 'all'
      ksu_ref:
        description: 'KernelSU / KernelSU-Next tag, commit, or auto for per-target defaults'
        required: true
        type: string
        default: 'auto'
      ksu_variant:
        description: 'KernelSU variant'
        required: true
        type: choice
        options:
          - 'KernelSU'
          - 'KernelSU-Next'
        default: 'KernelSU'
      arch:
        description: 'Target architecture'
        required: true
        type: choice
        options:
          - 'x86_64'
          - 'arm64'
          - 'both'
        default: 'x86_64'

jobs:
  build:
    name: Build Artifacts
    uses: ./.github/workflows/_build-gki-core.yml
    with:
      avd_target: ${{ inputs.avd_target }}
      ksu_ref: ${{ inputs.ksu_ref }}
      ksu_variant: ${{ inputs.ksu_variant }}
      arch: ${{ inputs.arch }}
      release_build: false
